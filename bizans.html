<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizans Tarihi - Kapsamlı Test</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e17;--surface:#1a1930;--surface2:#232145;--gold:#d4a94c;--gold-dim:#a67c2e;--cream:#fffbf0;--text:#e8e4d9;--text-dim:#8a8694;--correct:#4caf80;--correct-bg:rgba(76,175,128,.12);--wrong:#e05555;--wrong-bg:rgba(224,85,85,.12);--accent:#6c63ff;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(108,99,255,.06) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(212,169,76,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px}
.header{text-align:center;padding:50px 20px 30px;animation:fadeDown .8s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
.header-icon{font-size:48px;margin-bottom:16px;display:inline-block;filter:drop-shadow(0 0 20px rgba(212,169,76,.3))}
.header h1{font-family:'Crimson Pro',serif;font-size:clamp(28px,5vw,42px);font-weight:700;color:var(--cream);letter-spacing:-.5px;margin-bottom:8px}
.header h1 span{color:var(--gold)}
.header p{color:var(--text-dim);font-size:15px;max-width:500px;margin:0 auto;line-height:1.6}
.topic-grid{display:grid;grid-template-columns:1fr;gap:14px;margin:30px 0;animation:fadeUp .8s ease .2s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.topic-card{background:var(--surface);border:1px solid rgba(212,169,76,.12);border-radius:var(--radius);padding:22px 24px;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;gap:18px;position:relative;overflow:hidden}
.topic-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold);transform:scaleY(0);transition:transform .3s ease}
.topic-card:hover{border-color:rgba(212,169,76,.35);background:var(--surface2);transform:translateX(4px)}
.topic-card:hover::before{transform:scaleY(1)}
.topic-emoji{font-size:32px;flex-shrink:0}
.topic-info{flex:1}
.topic-info h3{font-family:'Crimson Pro',serif;font-size:19px;color:var(--cream);margin-bottom:4px}
.topic-info p{font-size:13px;color:var(--text-dim)}
.topic-count{background:rgba(212,169,76,.12);color:var(--gold);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;flex-shrink:0}
.quiz-container{animation:fadeUp .5s ease}
.quiz-top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.back-btn{background:none;border:1px solid rgba(255,255,255,.1);color:var(--text-dim);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;transition:all .2s}
.back-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.progress-info{display:flex;align-items:center;gap:14px;font-size:14px;color:var(--text-dim)}
.progress-bar-wrap{width:100%;height:5px;background:rgba(255,255,255,.06);border-radius:10px;margin-bottom:28px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:10px;transition:width .5s ease}
.question-card{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:32px 28px;margin-bottom:20px}
.q-number{font-size:12px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px}
.q-text{font-family:'Crimson Pro',serif;font-size:clamp(18px,3vw,22px);line-height:1.55;color:var(--cream);margin-bottom:28px}
.options{display:flex;flex-direction:column;gap:10px}
.option-btn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px 20px;color:var(--text);font-family:inherit;font-size:15px;text-align:left;cursor:pointer;transition:all .25s ease;line-height:1.5;display:flex;align-items:flex-start;gap:12px}
.option-btn:hover:not(.disabled){background:rgba(212,169,76,.06);border-color:rgba(212,169,76,.25)}
.option-letter{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.06);font-size:13px;font-weight:600;flex-shrink:0;margin-top:1px;transition:all .25s}
.option-btn.correct{background:var(--correct-bg);border-color:var(--correct)}
.option-btn.correct .option-letter{background:var(--correct);color:#fff}
.option-btn.wrong{background:var(--wrong-bg);border-color:var(--wrong)}
.option-btn.wrong .option-letter{background:var(--wrong);color:#fff}
.option-btn.disabled{cursor:default;opacity:.6}
.option-btn.correct.disabled,.option-btn.wrong.disabled{opacity:1}
.explanation{margin-top:18px;padding:16px 20px;background:rgba(108,99,255,.06);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;font-size:14px;line-height:1.65;color:var(--text);animation:fadeUp .4s ease}
.next-btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0f0e17;border:none;border-radius:10px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;margin-top:20px}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(212,169,76,.25)}
.results{text-align:center;padding:40px 20px;animation:fadeUp .6s ease}
.results-circle{width:160px;height:160px;border-radius:50%;margin:0 auto 28px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.results-circle::before{content:'';position:absolute;inset:0;border-radius:50%;border:4px solid rgba(255,255,255,.06)}
.results-circle::after{content:'';position:absolute;inset:0;border-radius:50%;border:4px solid transparent;border-top-color:var(--gold);border-right-color:var(--gold);animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.results-score{font-family:'Crimson Pro',serif;font-size:48px;font-weight:700;color:var(--gold)}
.results-label{font-size:14px;color:var(--text-dim)}
.results h2{font-family:'Crimson Pro',serif;font-size:28px;color:var(--cream);margin-bottom:10px}
.results p{color:var(--text-dim);font-size:15px;margin-bottom:30px;line-height:1.6}
.results-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:30px}
.stat-box{background:var(--surface);border-radius:10px;padding:18px 12px}
.stat-box .val{font-family:'Crimson Pro',serif;font-size:28px;font-weight:700}
.stat-box .label{font-size:12px;color:var(--text-dim);margin-top:4px}
.stat-box.green .val{color:var(--correct)}
.stat-box.red .val{color:var(--wrong)}
.stat-box.gold .val{color:var(--gold)}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn-primary{padding:14px 32px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0f0e17;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s}
.btn-secondary{padding:14px 32px;background:none;border:1px solid rgba(255,255,255,.12);color:var(--text);border-radius:10px;font-family:inherit;font-size:15px;cursor:pointer;transition:all .3s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(212,169,76,.2)}
.btn-secondary:hover{border-color:var(--gold-dim);color:var(--gold)}
.all-topics-btn{display:block;width:100%;padding:18px;background:linear-gradient(135deg,var(--accent),#8b83ff);color:#fff;border:none;border-radius:var(--radius);font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;transition:all .3s;animation:fadeUp .8s ease .4s both}
.all-topics-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,99,255,.3)}
@media(max-width:600px){.app{padding:12px}.question-card{padding:22px 18px}.results-stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
var TOPICS = [
{
id:"justinian",emoji:"👑",title:"Jüstinyen Devri ve VI. Yüzyıl (518-565)",desc:"Jüstinyen, Teodora, fetihler, hukuk, Nika İsyanı, medeniyet, din politikası",
questions:[
{q:"Jüstin'i tahta çıkaran olay nedir?",opts:["Halk oylaması","Karanlık bir entrika ve muhafız kıtaları kumandanı olması","Askeri zafer","Seçim"],ans:1,exp:"518\'de Anastaz\'ın ölümünde oldukça karanlık bir entrika, muhafız kıtaları kumandanı Jüstin\'i tahta çıkarmıştır."},
{q:"Jüstin tahta çıktığında yaklaşık kaç yaşındaydı?",opts:["50","60","70","80"],ans:2,exp:"70 yaşlarında sülale kuran bu sonradan görme..."},
{q:"Jüstin hangi bölgeden gelmiş bir köylüydü?",opts:["İzorya","Kapadokya","Makedonya","Trakya"],ans:2,exp:"Makedonya\'lı bir köylüydü."},
{q:"Jüstin'in en belirgin zaafı neydi?",opts:["Cesaret eksikliği","Çok cahil ve tecrübesiz olması","Sağlık sorunları","Askeri yetersizlik"],ans:1,exp:"İyi bir asker fakat çok cahil ve iş hususunda tamamıyla tecrübesizdi."},

{q:"Jüstinyen bizzat hangi yıllar arasında saltanat sürmüştür?",opts:["518-565","518-527","527-565","530-565"],ans:2,exp:"527\'den 565\'e kadar bizzat saltanat sürmüştür."},
{q:"Jüstinyen'in iki büyük ideali neydi?",opts:["Zenginlik ve güç","İmparatorluk fikri ve Hristiyanlık fikri","Toprak genişletme ve ticaret","Sanat ve bilim"],ans:1,exp:"İki büyük fikrin temsilcisiydi: İmparatorluk fikri, Hristiyanlık fikri."},
{q:"Saray adamlarından birinin Jüstinyen'e taktığı lakap?",opts:["Adil İmparator","Hiç Uyumayan İmparator","Altın İmparator","Muzaffer"],ans:1,exp:"Kendi saray adamlarından biri ona \'Hiç uyumayan imparator\' demişti."},
{q:"Jüstin devrinde Monofizitler'e ne yapılmıştır?",opts:["Hoşgörü gösterilmiştir","Üç sene şiddetle takip edilmişlerdir (518-521)","Sürgün edilmişlerdir","Yeni kiliseler verilmiştir"],ans:1,exp:"Ortodoks gayretinin teminatını vermek için üç sene (518-521) şiddetle takip edilmişlerdir."},
{q:"Yeni Roma'yı (İstanbul) ziyaret eden ilk Papa kimdir?",opts:["Papa Gregoire","Papa Jan (Jean) - 525","Papa Vigil","Papa Martin"],ans:1,exp:"525\'de Papa Jan İstanbul\'a gelmiştir."},
{q:"Teodora'nın babası ne iş yapıyordu?",opts:["Asker","Tüccar","Hippodrom'da ayılar bekçisi","Balıkçı"],ans:2,exp:"Koşu yerinde (Hippodrome) ayılar bekçisinin kızıydı."},
{q:"Teodora hangi yılda ölmüştür?",opts:["540","548","553","565"],ans:1,exp:"548\'de ölmüştür."},
{q:"Teodora'nın siyasi vizyonu Jüstinyen'den nasıl farklıydı?",opts:["Aynı düşünüyorlardı","Doğuya odaklanıyor, din kavgalarını çözmek istiyordu","Batı fetihlerini destekliyordu","Savaşa karşıydı"],ans:1,exp:"İmparatoriçe doğuya doğru gözlerini çeviriyordu; din kavgalarını susturmak istiyordu."},
{q:"Nika İsyanı hangi yıl ve nerede olmuştur?",opts:["530 - Ravenna","532 Ocağı - İstanbul","535 - Roma","540 - Antakya"],ans:1,exp:"532 ocağında İstanbul\'u bir hafta süreyle yangın ve kana boğmuştur."},

{q:"Nika İsyanı'nda Jüstinyen'i kimler kurtarmıştır?",opts:["Narses ve Tribonien","Teodora'nın cesareti ve Belizer'in azmi","Patrik Sergiyus","Halk desteği"],ans:1,exp:"Teodora\'nın cesareti, Belizer\'in azmi sayesinde kurtulabilmişti."},
{q:"532'de Sasanilerle barışın imzalanma sebebi?",opts:["Askeri zafer","Batıdaki emellerine odaklanmak için doğu tehlikesini bertaraf etmek","Ekonomik kriz","Din sorunları"],ans:1,exp:"Batıdaki ihtiraslı emellerini geciktiren engeli bertaraf etmek için barışı imzaladı."},

{q:"Vandal Kralı Gelimer hangi savaşlarda mağlup edilmiştir?",opts:["Dara ve Callinicum","Decimum ve Tricamarum","Taginae ve Kanpania","Ninova ve Ktezifon"],ans:1,exp:"Decimum ve Tricamarum\'da mağlup olan Gelimer Pappua tepesinde teslim olmuştur (534)."},

{q:"İtalya'nın kesin fethini tamamlayan komutan?",opts:["Belizer","Narses","Tribonien","Mundus"],ans:1,exp:"Taginae\'de (552) Narses\'in azmi ile fetih tamamlanmıştır."},
{q:"İtalya'nın fethi toplam kaç yıl sürmüştür?",opts:["5","10","20","30"],ans:2,exp:"İtalya ancak yirmi senede tekrar zapt olunabildi."},
{q:"Hüsrev Anuşirvan Antakya'yı hangi yılda yağma etmiştir?",opts:["532","537","540","545"],ans:2,exp:"540\'da Suriye üzerine atılıp Antakya\'yı yağma etmiştir."},
{q:"562'de İran'la imzalanan barış kaç yıllıktı?",opts:["10","25","50","100"],ans:2,exp:"562\'de elli senelik bir barış imzalanmıştır."},
{q:"559'da İstanbul önündeki Hunlara karşı şehri kim kurtarmıştır?",opts:["Narses","İhtiyar Belizer","Tribonien","Jüstinyen bizzat"],ans:1,exp:"İhtiyar Belizer\'in cesareti güç bela şehri kurtarabilmişti."},
{q:"Jüstinyen kanun yapma işini kime vermiştir?",opts:["Belizer","Narses","Tribonien","Kapadokyalı Jan"],ans:2,exp:"Nazır Tribonien\'e büyük bir yasama görevi verilmiştir."},
{q:"Codex Justinianus ilk olarak hangi yılda yayınlanmıştır?",opts:["527","529","533","535"],ans:1,exp:"529\'da yayınlanmıştır."},
{q:"Digeste (Pandectes) hangi yılda tamamlanmıştır?",opts:["529","530","533","535"],ans:2,exp:"533\'de tamamlanmıştır."},

{q:"535'deki idari reformda vilayetlerde ne yapılmıştır?",opts:["Vergi muafiyeti","Sivil ve askeri makamlar birleştirilmiştir","Yeni vilayetler kurulmuştur","Ordular dağıtılmıştır"],ans:1,exp:"Birçok vilayetlerde sivil ve askeri makamlar birleştirilmiştir."},
{q:"541'de tasarruf amacıyla kaldırılan kurum?",opts:["Senato","Konsüllük","Eksarhlık","Patriklik"],ans:1,exp:"541\'de konsüllüğün kaldırılması."},
{q:"Jüstinyen 529'da hangi okulu neden kapatmıştır?",opts:["İstanbul Üni. - mali","Atina Üni. - müşrik profesörler","Beyrut Hukuk - deprem","Roma Akad. - siyasi"],ans:1,exp:"İçinde birkaç müşrik profesör gizlenen Atina üniversitesini kapatmıştır."},
{q:"Üç Fasıl meselesi imparatorluğu kaç yıl karıştırmıştır?",opts:["10","15","20'den fazla (543-565)","30"],ans:2,exp:"Yirmi seneden fazla (543-565) karıştırmıştır."},
{q:"Jüstinyen kendini nasıl ilan etmiştir?",opts:["Sadece imparator","İmparator ve papas","Tanrının oğlu","Kutsal kral"],ans:1,exp:"Kendini açıktan açığa \'imparator ve papas\' ilan etmiştir."},
{q:"Ayasofya hangi yıllar arasında ve kimler tarafından inşa edilmiştir?",opts:["527-530, yerli ustalar","530-535, Romalı mimarlar","532-537, Aydınlı Anthemus ve Miletli İsidore","535-540, Suriyeli mimarlar"],ans:2,exp:"532-537 arasında Aydınlı Anthemus ve Miletli İsidore tarafından yapılmıştır."},
{q:"557'de Çin'den getirilen önemli sır nedir?",opts:["Barut","Kağıt","İpekböceği yetiştiriciliği","Pusula"],ans:2,exp:"557\'de iki rahip Çin\'den ipekböceği yetiştirilmesi sırrını getirmişlerdir."},

var state={screen:'home',topicId:null,qIndex:0,answered:false,selectedOpt:-1,score:0};
function render(){var a=document.getElementById('app');if(state.screen==='home')renderHome(a);else if(state.screen==='quiz')renderQuiz(a);else renderResult(a);}
function renderHome(a){var t=TOPICS.reduce(function(s,t){return s+t.questions.length;},0);var cards='';for(var i=0;i<TOPICS.length;i++){var tp=TOPICS[i];cards+='<div class="topic-card" onclick="startTopic(\''+tp.id+'\')"><div class="topic-emoji">'+tp.emoji+'</div><div class="topic-info"><h3>'+tp.title+'</h3><p>'+tp.desc+'</p></div><div class="topic-count">'+tp.questions.length+' Soru</div></div>';}a.innerHTML='<div class="header"><div class="header-icon">🏛️</div><h1>Bizans Tarihi <span>Kapsamlı Test</span></h1><p>Jüstinyen\'den İkonoklazm\'a, Thema Sistemi\'nden Arap Fetihlerine — '+t+' soruyla bilgini sına!</p></div><div class="topic-grid">'+cards+'</div><button class="all-topics-btn" onclick="startAll()">🎯 Tüm Konular — '+t+' Soru</button>';}
function startTopic(id){state={screen:'quiz',topicId:id,qIndex:0,answered:false,selectedOpt:-1,score:0};render();window.scrollTo({top:0,behavior:'smooth'});}
function startAll(){state={screen:'quiz',topicId:'__all__',qIndex:0,answered:false,selectedOpt:-1,score:0};render();window.scrollTo({top:0,behavior:'smooth'});}
function getQuestions(){if(state.topicId==='__all__'){var all=[];for(var i=0;i<TOPICS.length;i++){var t=TOPICS[i];for(var j=0;j<t.questions.length;j++){var q=Object.assign({},t.questions[j]);q._topic=t.title;all.push(q);}}return all;}for(var i=0;i<TOPICS.length;i++){if(TOPICS[i].id===state.topicId)return TOPICS[i].questions;}return[];}
function getTopicTitle(){if(state.topicId==='__all__')return'Tüm Konular';for(var i=0;i<TOPICS.length;i++){if(TOPICS[i].id===state.topicId)return TOPICS[i].title;}return'';}
function renderQuiz(a){var qs=getQuestions(),q=qs[state.qIndex],total=qs.length,prog=((state.qIndex)/total)*100,L=['A','B','C','D'];var optsHtml='';for(var i=0;i<q.opts.length;i++){var c='';if(state.answered){c='disabled';if(i===q.ans)c+=' correct';else if(i===state.selectedOpt)c+=' wrong';}optsHtml+='<button class="option-btn '+c+'" onclick="sel('+i+')" '+(state.answered?'disabled':'')+'><span class="option-letter">'+L[i]+'</span><span>'+q.opts[i]+'</span></button>';}var topicLabel=q._topic?' · '+q._topic:'';a.innerHTML='<div class="quiz-container"><div class="quiz-top-bar"><button class="back-btn" onclick="goHome()">← Konular</button><div class="progress-info"><span>'+(state.qIndex+1)+' / '+total+'</span><span>·</span><span>Doğru: '+state.score+'</span></div></div><div class="progress-bar-wrap"><div class="progress-bar" style="width:'+prog+'%"></div></div><div class="question-card"><div class="q-number">Soru '+(state.qIndex+1)+topicLabel+'</div><div class="q-text">'+q.q+'</div><div class="options">'+optsHtml+'</div>'+(state.answered?'<div class="explanation">💡 '+q.exp+'</div>':'')+'</div>'+(state.answered?'<button class="next-btn" onclick="next()">'+(state.qIndex+1<total?'Sonraki Soru →':'Sonuçları Gör 🏆')+'</button>':'')+'</div>';}
function sel(i){if(state.answered)return;var q=getQuestions()[state.qIndex];state.answered=true;state.selectedOpt=i;if(i===q.ans)state.score++;render();}
function next(){var qs=getQuestions();if(state.qIndex+1<qs.length){state.qIndex++;state.answered=false;state.selectedOpt=-1;render();window.scrollTo({top:0,behavior:'smooth'});}else{state.screen='result';render();window.scrollTo({top:0,behavior:'smooth'});}}
function renderResult(a){var qs=getQuestions(),t=qs.length,p=Math.round((state.score/t)*100),w=t-state.score;var m='';if(p>=90)m='Mükemmel! Bizans tarihine hâkimsin! 🏆';else if(p>=70)m='Çok iyi! Birkaç eksik var ama güçlü performans. 👏';else if(p>=50)m='Fena değil ama tekrar çalışmanı öneririm. 📚';else m='Daha çok çalışman gerekiyor. Tekrar dene! 💪';a.innerHTML='<div class="results"><div class="results-circle"><div class="results-score">%'+p+'</div><div class="results-label">Başarı</div></div><h2>'+getTopicTitle()+'</h2><p>'+m+'</p><div class="results-stats"><div class="stat-box green"><div class="val">'+state.score+'</div><div class="label">Doğru</div></div><div class="stat-box red"><div class="val">'+w+'</div><div class="label">Yanlış</div></div><div class="stat-box gold"><div class="val">'+t+'</div><div class="label">Toplam</div></div></div><div class="btn-row"><button class="btn-primary" onclick="retry()">Tekrar Dene</button><button class="btn-secondary" onclick="goHome()">Konulara Dön</button></div></div>';}
function retry(){state.qIndex=0;state.answered=false;state.selectedOpt=-1;state.score=0;state.screen='quiz';render();window.scrollTo({top:0,behavior:'smooth'});}
function goHome(){state={screen:'home',topicId:null,qIndex:0,answered:false,selectedOpt:-1,score:0};render();window.scrollTo({top:0,behavior:'smooth'});}
render();
</script>
