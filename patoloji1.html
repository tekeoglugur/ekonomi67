<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSY 306 — Psikopatoloji Test Uygulaması</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=SF+Pro+Text:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --accent: #0071e3;
  --accent-hover: #0077ED;
  --success: #30d158;
  --success-bg: #e8f9ed;
  --danger: #ff3b30;
  --danger-bg: #ffeceb;
  --warning: #ff9f0a;
  --border: rgba(0,0,0,0.06);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
  --radius: 16px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

/* Navigation */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(245,245,247,0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-brand {
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.3px;
}

.nav-brand span { color: var(--accent); }

.nav-stats {
  display: flex;
  gap: 20px;
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}

.nav-stats .stat-val { color: var(--text); font-weight: 600; }

/* Main Container */
.main-container {
  max-width: 780px;
  margin: 0 auto;
  padding: 80px 20px 40px;
}

/* Hero Section */
.hero {
  text-align: center;
  padding: 60px 20px 40px;
  animation: fadeUp 0.8s ease;
}

.hero-badge {
  display: inline-block;
  background: linear-gradient(135deg, #0071e3, #5856d6);
  color: white;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 6vw, 48px);
  font-weight: 400;
  letter-spacing: -0.5px;
  line-height: 1.15;
  margin-bottom: 14px;
}

.hero p {
  font-size: 17px;
  color: var(--text-secondary);
  line-height: 1.6;
  max-width: 520px;
  margin: 0 auto;
}

/* Topic Grid */
.topic-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-top: 32px;
  animation: fadeUp 0.8s ease 0.15s both;
}

.topic-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 22px 24px;
  display: flex;
  align-items: center;
  gap: 18px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.topic-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: rgba(0,113,227,0.15);
}

.topic-card:active { transform: scale(0.98); }

.topic-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.topic-info { flex: 1; min-width: 0; }

.topic-info h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 3px;
  letter-spacing: -0.2px;
}

.topic-info p {
  font-size: 13px;
  color: var(--text-secondary);
}

.topic-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.topic-count {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}

.topic-progress {
  width: 44px;
  height: 4px;
  background: #f0f0f0;
  border-radius: 2px;
  overflow: hidden;
}

.topic-progress-bar {
  height: 100%;
  background: var(--success);
  border-radius: 2px;
  transition: width 0.5s ease;
}

.topic-arrow {
  color: var(--text-secondary);
  font-size: 18px;
  transition: transform var(--transition);
}

.topic-card:hover .topic-arrow { transform: translateX(3px); }

/* Quiz View */
.quiz-view { display: none; animation: fadeUp 0.5s ease; }

.quiz-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--card);
  color: var(--accent);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}

.back-btn:hover { background: var(--accent); color: white; }

.quiz-header-info h2 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.quiz-header-info p {
  font-size: 13px;
  color: var(--text-secondary);
}

/* Progress Bar */
.progress-container {
  background: #e8e8ed;
  border-radius: 6px;
  height: 6px;
  margin-bottom: 32px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #0071e3, #5856d6);
  border-radius: 6px;
  transition: width 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
}

/* Question Card */
.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  margin-bottom: 20px;
}

.question-number {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.question-text {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.5;
  letter-spacing: -0.2px;
  margin-bottom: 28px;
}

/* Options */
.options-list { display: flex; flex-direction: column; gap: 10px; }

.option-btn {
  width: 100%;
  text-align: left;
  background: #f9f9fb;
  border: 2px solid #ececf0;
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  font-size: 15px;
  font-family: inherit;
  line-height: 1.5;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: flex-start;
  gap: 14px;
  color: var(--text);
}

.option-btn:hover:not(.disabled) {
  border-color: var(--accent);
  background: rgba(0,113,227,0.04);
}

.option-letter {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #e8e8ed;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
  transition: all var(--transition);
}

.option-btn:hover:not(.disabled) .option-letter {
  background: var(--accent);
  color: white;
}

.option-btn.correct {
  border-color: var(--success) !important;
  background: var(--success-bg) !important;
}

.option-btn.correct .option-letter {
  background: var(--success) !important;
  color: white !important;
}

.option-btn.wrong {
  border-color: var(--danger) !important;
  background: var(--danger-bg) !important;
}

.option-btn.wrong .option-letter {
  background: var(--danger) !important;
  color: white !important;
}

.option-btn.disabled { cursor: default; opacity: 0.7; }
.option-btn.correct.disabled, .option-btn.wrong.disabled { opacity: 1; }

/* Explanation */
.explanation {
  display: none;
  margin-top: 20px;
  padding: 18px 20px;
  border-radius: var(--radius-sm);
  background: #f0f5ff;
  border-left: 4px solid var(--accent);
  font-size: 14px;
  line-height: 1.65;
  color: #333;
  animation: fadeUp 0.4s ease;
}

.explanation.show { display: block; }

.explanation strong { color: var(--accent); }

/* Next Button */
.next-btn-container {
  display: flex;
  justify-content: flex-end;
  margin-top: 16px;
}

.next-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 980px;
  padding: 12px 28px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  display: none;
}

.next-btn:hover { background: var(--accent-hover); transform: scale(1.02); }
.next-btn.show { display: inline-flex; }

/* Results */
.results-view {
  display: none;
  text-align: center;
  animation: fadeUp 0.6s ease;
}

.results-card {
  background: var(--card);
  border-radius: 24px;
  padding: 48px 32px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
}

.results-emoji { font-size: 56px; margin-bottom: 16px; }

.results-card h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  font-weight: 400;
  margin-bottom: 8px;
}

.results-card p {
  color: var(--text-secondary);
  font-size: 15px;
  margin-bottom: 28px;
}

.score-ring {
  width: 140px;
  height: 140px;
  margin: 0 auto 28px;
  position: relative;
}

.score-ring svg { transform: rotate(-90deg); }

.score-ring circle {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
}

.score-ring .ring-bg { stroke: #e8e8ed; }

.score-ring .ring-fill {
  stroke: var(--accent);
  transition: stroke-dashoffset 1.5s cubic-bezier(0.25, 0.1, 0.25, 1);
}

.score-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
}

.score-text span { font-size: 16px; color: var(--text-secondary); font-weight: 500; }

.results-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary-custom {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 980px;
  padding: 13px 28px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
}

.btn-primary-custom:hover { background: var(--accent-hover); transform: scale(1.02); }

.btn-secondary-custom {
  background: transparent;
  color: var(--accent);
  border: 1.5px solid var(--accent);
  border-radius: 980px;
  padding: 13px 28px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
}

.btn-secondary-custom:hover { background: rgba(0,113,227,0.06); }

/* Review */
.review-section {
  margin-top: 32px;
  text-align: left;
}

.review-section h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  text-align: center;
}

.review-item {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}

.review-item.review-correct { border-left: 4px solid var(--success); }
.review-item.review-wrong { border-left: 4px solid var(--danger); }

.review-q {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
}

.review-answer {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.review-answer .correct-label { color: var(--success); font-weight: 600; }
.review-answer .wrong-label { color: var(--danger); font-weight: 600; }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* Color Themes for Topic Icons */
.icon-blue { background: #e3f2fd; color: #1976d2; }
.icon-purple { background: #f3e5f5; color: #7b1fa2; }
.icon-green { background: #e8f5e9; color: #2e7d32; }
.icon-orange { background: #fff3e0; color: #e65100; }
.icon-red { background: #fce4ec; color: #c62828; }
.icon-teal { background: #e0f2f1; color: #00695c; }
.icon-indigo { background: #e8eaf6; color: #283593; }
.icon-pink { background: #fce4ec; color: #ad1457; }
.icon-amber { background: #fff8e1; color: #ff6f00; }
.icon-cyan { background: #e0f7fa; color: #00838f; }

/* Responsive */
@media (max-width: 600px) {
  .question-card { padding: 24px 20px; }
  .hero { padding: 40px 10px 30px; }
  .topic-card { padding: 18px 16px; }
  .nav-stats { display: none; }
}
</style>
</head>
<body>

<!-- Top Navigation -->
<nav class="top-nav">
  <div class="nav-brand">PSY<span>306</span> Psikopatoloji</div>
  <div class="nav-stats">
    <div>Tamamlanan: <span class="stat-val" id="completedCount">0</span>/<span id="totalTopics">10</span></div>
    <div>Genel Başarı: <span class="stat-val" id="overallScore">—</span></div>
  </div>
</nav>

<div class="main-container">

  <!-- HERO / TOPIC SELECT -->
  <div id="homeView">
    <div class="hero">
      <div class="hero-badge">2025–2026 Bahar Dönemi</div>
      <h1>Psikopatoloji<br>Test Uygulaması</h1>
      <p>Hafta 5–8 ders içeriklerini kapsayan interaktif sorularla bilgini test et ve öğren.</p>
    </div>

    <div class="topic-grid" id="topicGrid"></div>
  </div>

  <!-- QUIZ VIEW -->
  <div class="quiz-view" id="quizView">
    <div class="quiz-header">
      <button class="back-btn" onclick="goHome()">←</button>
      <div class="quiz-header-info">
        <h2 id="quizTitle"></h2>
        <p id="quizSubtitle"></p>
      </div>
    </div>
    <div class="progress-container">
      <div class="progress-fill" id="progressBar"></div>
    </div>
    <div id="questionArea"></div>
    <div class="next-btn-container">
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Sonraki Soru →</button>
    </div>
  </div>

  <!-- RESULTS VIEW -->
  <div class="results-view" id="resultsView">
    <div class="results-card">
      <div class="results-emoji" id="resultsEmoji"></div>
      <h2 id="resultsTitle"></h2>
      <p id="resultsSubtitle"></p>
      <div class="score-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle class="ring-bg" cx="70" cy="70" r="58"/>
          <circle class="ring-fill" id="scoreRing" cx="70" cy="70" r="58"
            stroke-dasharray="364.42" stroke-dashoffset="364.42"/>
        </svg>
        <div class="score-text" id="scoreText"></div>
      </div>
      <div class="results-actions">
        <button class="btn-primary-custom" onclick="retryQuiz()">Tekrar Dene</button>
        <button class="btn-secondary-custom" onclick="goHome()">Konulara Dön</button>
      </div>
    </div>
    <div class="review-section" id="reviewSection" style="display:none">
      <h3>Soru İnceleme</h3>
      <div id="reviewList"></div>
    </div>
  </div>

</div>

<script>
// ==================== QUESTION DATABASE ====================
const topics = [
  {
    id: "kaygi-genel",
    title: "Kaygı Bozuklukları — Genel",
    desc: "Korku, kaygı ve temel kavramlar",
    icon: "🧠",
    iconClass: "icon-blue",
    questions: [
      {
        q: "Kaygı (anksiyete) yaşayan kişiler genellikle bu durumu nasıl tanımlamaktadır?",
        opts: ["Heyecan verici bir enerji hali", "Sebepsiz korku, kötü bir şey olacakmış hissi ve rahatsız edici endişe", "Yalnızca fiziksel bir ağrı", "Kontrol edilebilen bir düşünce"],
        ans: 1,
        exp: "Kaygı yaşayan kişiler genellikle durumu <strong>sebepsiz bir korku</strong>, <strong>kötü bir şey olacakmış hissi</strong> ve <strong>rahatsız edici bir endişe hali</strong> olarak tanımlamaktadır."
      },
      {
        q: "Korku ve kaygının bedensel belirtileri arasında hangisi yer ALMAZ?",
        opts: ["Kas gerginliği", "Kalp ritminde artış", "İştah artışı", "Terleme"],
        ans: 2,
        exp: "Korku ve kaygının bedensel belirtileri: <strong>kas gerginliği, nefes alıp vermede düzensizlik, kalp ritminde artış ve terleme</strong>dir. İştah artışı tipik bir kaygı belirtisi değildir."
      },
      {
        q: "Korku ve kaygı ne zaman 'yanlış alarm sistemi' olarak nitelendirilir?",
        opts: ["Yalnızca gece yaşandığında", "Yoğunluğu, şiddeti, süresi ve sıklığı arttığında", "Sadece çocuklukta görüldüğünde", "İlaç tedavisi gerektiğinde"],
        ans: 1,
        exp: "Korku ve kaygının <strong>yoğunluğu, şiddeti, süresi ve sıklığı</strong> normalin ötesine geçtiğinde bir 'yanlış alarm sistemi' haline gelir ve uyum bozulur."
      },
      {
        q: "Kaygı bozukluklarının tanılanması için aşağıdakilerden hangisi gereklidir?",
        opts: ["Yalnızca DSM-5 kriterlerinin karşılanması yeterlidir", "DSM-5 kriterleri + işlevsellikte bozulma/yoğun sıkıntı + ilaç/madde etkisinden kaynaklanmama", "Kişinin kaygılı olduğunu kabul etmesi", "En az 1 yıl sürmesi"],
        ans: 1,
        exp: "Tanılama için DSM-5 kriterleri karşılanmalı, semptomlar <strong>işlevsellikte bozulmaya</strong> veya <strong>yoğun sıkıntıya</strong> yol açmalı ve semptomlar ilaç, tıbbi durum veya madde etkisinden kaynaklanmamalıdır."
      },
      {
        q: "Ayırıcı tanı (differential diagnosis) ne anlama gelmektedir?",
        opts: ["İki farklı bozukluğun aynı anda tanı konması", "Aynı ya da benzer belirtileri açıklayabilecek diğer bozuklukların sistematik olarak dışlanması", "Her bozukluk için ayrı tedavi planlaması", "Tanıların sınıflandırılması"],
        ans: 1,
        exp: "<strong>Ayırıcı tanı</strong>, aynı ya da benzer belirtileri açıklayabilecek diğer bozuklukların sistematik olarak dışlanması anlamına gelir. Her kaygı bozukluğunun 'odak noktası' farklılık gösterir."
      },
      {
        q: "DSM-5'te kaygı bozuklukları sınıflandırmasına DSM-IV-TR'den farklı olarak eklenen tanılar hangileridir?",
        opts: ["OKB ve TSSB eklendi", "Ayrılma Kaygısı Bozukluğu ve Seçici Konuşmazlık eklendi", "Panik Bozukluk ve Agorafobi eklendi", "Hiçbir değişiklik yapılmadı"],
        ans: 1,
        exp: "DSM-5'te <strong>Ayrılma Kaygısı Bozukluğu</strong> ve <strong>Seçici Konuşmazlık (Mutizm)</strong> kaygı bozuklukları kategorisine eklenmiştir. OKB ve TSSB ise ayrı kategorilere taşınmıştır."
      },
      {
        q: "Belirli ölçüde korku ve kaygının işlevsel olmasına örnek olarak aşağıdakilerden hangisi verilebilir?",
        opts: ["Sürekli endişelenme", "Zorlu hava koşullarında dikkatli araba kullanmak", "Sosyal ortamlardan kaçınma", "Uyku bozukluğu yaşama"],
        ans: 1,
        exp: "Belirli ölçüde korku ve kaygı <strong>işlevsellik sağlar</strong>; örneğin zorlu hava koşullarında dikkatli araba kullanmak ve akademik/iş hayatında daha fazla çalışmak gibi."
      }
    ]
  },
  {
    id: "yaygin-kaygi",
    title: "Yaygın Kaygı Bozukluğu",
    desc: "DSM-5 kriterleri, etiyoloji ve tedavi",
    icon: "😰",
    iconClass: "icon-purple",
    questions: [
      {
        q: "Yaygın Kaygı Bozukluğu (YKB) DSM-5 kriterlerine göre kaygı ve endişe en az ne kadar süredir devam etmelidir?",
        opts: ["1 ay", "3 ay", "6 ay", "1 yıl"],
        ans: 2,
        exp: "YKB tanısı için kaygı ve endişe <strong>en az 6 aylık sürenin büyük bir bölümünde</strong> birçok olay ya da eylemle ilgili olarak devam etmelidir."

        ans: 1,
        exp: "Manide kullanılan savunma düzenekleri: <strong>inkar, eyleme-koyma (dökme), değersizleştirme</strong> ve <strong>tümgüçlü kontrol</strong>."

// ==================== APP STATE ====================
let currentTopic = null;
let currentQ = 0;
let score = 0;
let answers = [];
let topicScores = {};

// ==================== INITIALIZATION ====================
function init() {
  document.getElementById('totalTopics').textContent = topics.length;
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = '';
  topics.forEach((t, i) => {
    const completed = topicScores[t.id];
    const pct = completed ? Math.round((completed.score / completed.total) * 100) : 0;
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.onclick = () => startQuiz(i);
    card.style.animationDelay = `${i * 0.05}s`;
    card.innerHTML = `
      <div class="topic-icon ${t.iconClass}">${t.icon}</div>
      <div class="topic-info">
        <h3>${t.title}</h3>
        <p>${t.desc}</p>
      </div>
      <div class="topic-meta">
        <span class="topic-count">${t.questions.length} soru</span>
        <div class="topic-progress">
          <div class="topic-progress-bar" style="width:${completed ? pct : 0}%"></div>
        </div>
      </div>
      <span class="topic-arrow">›</span>
    `;
    grid.appendChild(card);
  });
  updateNavStats();
}

function updateNavStats() {
  const completed = Object.keys(topicScores).length;
  document.getElementById('completedCount').textContent = completed;
  if (completed > 0) {
    let totalCorrect = 0, totalQ = 0;
    Object.values(topicScores).forEach(s => { totalCorrect += s.score; totalQ += s.total; });
    document.getElementById('overallScore').textContent = Math.round((totalCorrect / totalQ) * 100) + '%';
  } else {
    document.getElementById('overallScore').textContent = '—';
  }
}

// ==================== QUIZ FLOW ====================
function startQuiz(topicIndex) {
  currentTopic = topicIndex;
  currentQ = 0;
  score = 0;
  answers = [];

  const t = topics[topicIndex];
  // Shuffle questions
  t._shuffled = [...t.questions].sort(() => Math.random() - 0.5);

  document.getElementById('quizTitle').textContent = t.title;
  document.getElementById('quizSubtitle').textContent = `${t.questions.length} soru · ${t.desc}`;

  document.getElementById('homeView').style.display = 'none';
  document.getElementById('resultsView').style.display = 'none';
  document.getElementById('quizView').style.display = 'block';
  document.getElementById('quizView').style.animation = 'fadeUp 0.5s ease';

  showQuestion();
}

function showQuestion() {
  const t = topics[currentTopic];
  const qs = t._shuffled;
  const q = qs[currentQ];
  const total = qs.length;

  // Progress
  document.getElementById('progressBar').style.width = `${((currentQ) / total) * 100}%`;

  // Shuffle options
  const optIndices = q.opts.map((_, i) => i);
  const shuffledOpts = optIndices.sort(() => Math.random() - 0.5);
  const newAns = shuffledOpts.indexOf(q.ans);

  const letters = ['A', 'B', 'C', 'D'];
  const area = document.getElementById('questionArea');
  area.innerHTML = `
    <div class="question-card" style="animation: scaleIn 0.35s ease">
      <div class="question-number">Soru ${currentQ + 1} / ${total}</div>
      <div class="question-text">${q.q}</div>
      <div class="options-list">
        ${shuffledOpts.map((optIdx, i) => `
          <button class="option-btn" data-idx="${i}" data-correct="${i === newAns ? 'true' : 'false'}" onclick="selectOption(this, ${i}, ${newAns})">
            <span class="option-letter">${letters[i]}</span>
            <span>${q.opts[optIdx]}</span>
          </button>
        `).join('')}
      </div>
      <div class="explanation" id="explanation">${q.exp}</div>
    </div>
  `;

  document.getElementById('nextBtn').classList.remove('show');
}

function selectOption(btn, selected, correct) {
  const allBtns = document.querySelectorAll('.option-btn');
  if (btn.classList.contains('disabled')) return;

  allBtns.forEach(b => b.classList.add('disabled'));

  if (selected === correct) {
    btn.classList.add('correct');
    score++;
    answers.push({ correct: true });
  } else {
    btn.classList.add('wrong');
    allBtns[correct].classList.add('correct');
    answers.push({ correct: false });
  }

  document.getElementById('explanation').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');

  // Update progress
  const t = topics[currentTopic];
  const total = t._shuffled.length;
  document.getElementById('progressBar').style.width = `${((currentQ + 1) / total) * 100}%`;
}

function nextQuestion() {
  const t = topics[currentTopic];
  currentQ++;
  if (currentQ < t._shuffled.length) {
    showQuestion();
  } else {
    showResults();
  }
}

// ==================== RESULTS ====================
function showResults() {
  const t = topics[currentTopic];
  const total = t._shuffled.length;
  const pct = Math.round((score / total) * 100);

  topicScores[t.id] = { score, total };

  document.getElementById('quizView').style.display = 'none';
  document.getElementById('resultsView').style.display = 'block';
  document.getElementById('resultsView').style.animation = 'fadeUp 0.6s ease';

  let emoji, title, subtitle;
  if (pct >= 90) { emoji = '🏆'; title = 'Mükemmel!'; subtitle = 'Bu konuyu çok iyi biliyorsun!'; }
  else if (pct >= 70) { emoji = '👏'; title = 'Harika!'; subtitle = 'Güçlü bir performans gösterdin.'; }
  else if (pct >= 50) { emoji = '📚'; title = 'İyi gidiyorsun!'; subtitle = 'Birkaç konuyu tekrar etmen faydalı olabilir.'; }
  else { emoji = '💪'; title = 'Çalışmaya devam!'; subtitle = 'Bu konuyu tekrar gözden geçirmeni öneririm.'; }

  document.getElementById('resultsEmoji').textContent = emoji;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsSubtitle').textContent = subtitle;
  document.getElementById('scoreText').innerHTML = `${pct}<span>%</span>`;

  // Animate ring
  const circumference = 2 * Math.PI * 58;
  const offset = circumference - (pct / 100) * circumference;
  const ring = document.getElementById('scoreRing');
  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = circumference;
  setTimeout(() => { ring.style.strokeDashoffset = offset; }, 100);

  // Change ring color
  if (pct >= 70) ring.style.stroke = 'var(--success)';
  else if (pct >= 50) ring.style.stroke = 'var(--warning)';
  else ring.style.stroke = 'var(--danger)';

  // Review
  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = '';
  t._shuffled.forEach((q, i) => {
    const isCorrect = answers[i].correct;
    const item = document.createElement('div');
    item.className = `review-item ${isCorrect ? 'review-correct' : 'review-wrong'}`;
    item.innerHTML = `
      <div class="review-q">${i + 1}. ${q.q}</div>
      <div class="review-answer">
        ${isCorrect
          ? '<span class="correct-label">✓ Doğru cevap</span>'
          : `<span class="wrong-label">✗ Yanlış</span> · Doğru: ${q.opts[q.ans]}`
        }
      </div>
    `;
    reviewList.appendChild(item);
  });
  document.getElementById('reviewSection').style.display = 'block';

  updateNavStats();
  init(); // refresh topic cards
}

function retryQuiz() {
  startQuiz(currentTopic);
}

function goHome() {
  document.getElementById('quizView').style.display = 'none';
  document.getElementById('resultsView').style.display = 'none';
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('homeView').style.animation = 'fadeUp 0.4s ease';
  init();
}

// Start
init();
</script>
