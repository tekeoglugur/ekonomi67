<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türk Dış Politikası - Quiz</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=SF+Pro+Text:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --accent: #0071e3;
  --accent-hover: #0077ED;
  --correct: #34c759;
  --correct-bg: rgba(52,199,89,0.08);
  --wrong: #ff3b30;
  --wrong-bg: rgba(255,59,48,0.08);
  --border: rgba(0,0,0,0.06);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  --radius: 18px;
  --radius-sm: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  --font-text: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Top Bar */
.top-bar {
  background: rgba(255,255,255,0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 14px 0;
}
.top-bar h1 {
  font-size: 17px;
  font-weight: 600;
  text-align: center;
  letter-spacing: -0.02em;
}
.top-bar .stats {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 6px;
  font-family: var(--font-text);
  font-size: 13px;
  color: var(--text-secondary);
}
.top-bar .stats span { font-weight: 500; color: var(--text); }

/* Container */
.app-container {
  max-width: 680px;
  margin: 0 auto;
  padding: 24px 20px 100px;
}

/* Home Screen */
.home-screen { animation: fadeUp 0.5s ease; }

.hero {
  text-align: center;
  padding: 60px 0 40px;
}
.hero-icon {
  width: 80px;
  height: 80px;
  border-radius: 22px;
  background: linear-gradient(145deg, #0071e3, #00c7be);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 36px;
  box-shadow: 0 6px 24px rgba(0,113,227,0.3);
}
.hero h2 {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 8px;
}
.hero p {
  font-size: 17px;
  color: var(--text-secondary);
  font-weight: 400;
  line-height: 1.5;
}

/* Topic Cards */
.topic-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 12px;
}
.topic-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px 22px;
  cursor: pointer;
  transition: all 0.25s ease;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  overflow: hidden;
}
.topic-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}
.topic-card:active { transform: scale(0.985); }
.topic-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.topic-info { flex: 1; }
.topic-info h3 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 3px;
}
.topic-info p {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 400;
}
.topic-count {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
  background: var(--bg);
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.topic-card .chevron {
  color: var(--text-secondary);
  font-size: 18px;
  opacity: 0.4;
}

/* Start All */
.start-all-btn {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 17px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 20px;
  letter-spacing: -0.01em;
}
.start-all-btn:hover { background: var(--accent-hover); }
.start-all-btn:active { transform: scale(0.98); }

/* Quiz Screen */
.quiz-screen { display: none; animation: fadeUp 0.4s ease; }

.progress-section {
  margin-bottom: 28px;
}
.progress-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.progress-label {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
  font-family: var(--font-text);
}
.progress-bar-outer {
  height: 6px;
  background: rgba(0,0,0,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-inner {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.q-category {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
  font-family: var(--font-text);
}
.q-number {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
  margin-bottom: 10px;
  font-family: var(--font-text);
}
.q-text {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.4;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  width: 100%;
  text-align: left;
  padding: 16px 18px;
  background: var(--bg);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 400;
  font-family: var(--font-text);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.4;
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.option-btn:hover:not(.disabled) {
  background: rgba(0,113,227,0.06);
  border-color: rgba(0,113,227,0.2);
}
.option-btn:active:not(.disabled) { transform: scale(0.985); }
.option-letter {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: rgba(0,0,0,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  flex-shrink: 0;
  transition: all 0.2s;
}
.option-btn.correct {
  background: var(--correct-bg);
  border-color: var(--correct);
}
.option-btn.correct .option-letter {
  background: var(--correct);
  color: white;
}
.option-btn.wrong {
  background: var(--wrong-bg);
  border-color: var(--wrong);
}
.option-btn.wrong .option-letter {
  background: var(--wrong);
  color: white;
}
.option-btn.disabled { pointer-events: none; opacity: 0.55; }
.option-btn.correct.disabled, .option-btn.wrong.disabled { opacity: 1; }

/* Explanation */
.explanation {
  margin-top: 18px;
  padding: 16px 18px;
  background: rgba(0,113,227,0.04);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent);
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  font-family: var(--font-text);
  display: none;
  animation: fadeUp 0.3s ease;
}

/* Next Button */
.next-btn {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 17px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
  display: none;
  letter-spacing: -0.01em;
}
.next-btn:hover { background: var(--accent-hover); }
.next-btn:active { transform: scale(0.98); }

/* Results Screen */
.results-screen { display: none; animation: fadeUp 0.5s ease; }

.result-hero {
  text-align: center;
  padding: 48px 0 32px;
}
.result-score {
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -0.04em;
  background: linear-gradient(135deg, var(--accent), #00c7be);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
  margin-bottom: 8px;
}
.result-label {
  font-size: 17px;
  color: var(--text-secondary);
  font-weight: 400;
}

.result-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 18px 14px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.stat-label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
  margin-top: 4px;
  font-family: var(--font-text);
}
.stat-card.green .stat-value { color: var(--correct); }
.stat-card.red .stat-value { color: var(--wrong); }

.result-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.btn-primary-action {
  padding: 16px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
}
.btn-primary-action:hover { background: var(--accent-hover); }
.btn-secondary-action {
  padding: 16px;
  background: rgba(0,113,227,0.08);
  color: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
}
.btn-secondary-action:hover { background: rgba(0,113,227,0.14); }

/* Back button */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 15px;
  color: var(--accent);
  font-weight: 500;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font);
  padding: 8px 0;
  margin-bottom: 8px;
  transition: opacity 0.2s;
}
.back-btn:hover { opacity: 0.7; }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

/* Responsive */
@media (max-width: 480px) {
  .hero h2 { font-size: 28px; }
  .q-text { font-size: 18px; }
  .question-card { padding: 22px 18px; }
  .result-score { font-size: 56px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar" id="topBar">
  <div class="container">
    <h1 id="topTitle">Türk Dış Politikası</h1>
    <div class="stats" id="topStats" style="display:none;">
      <div>Doğru: <span id="statCorrect">0</span></div>
      <div>Yanlış: <span id="statWrong">0</span></div>

  </div>
</div>

<div class="app-container">
  <!-- Home Screen -->
  <div class="home-screen" id="homeScreen">
    <div class="hero">
      <div class="hero-icon">📜</div>

      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>

      <div class="q-category" id="qCategory"></div>
      <div class="q-text" id="qText"></div>

    <button class="next-btn" id="nextBtn">Sonraki Soru</button>

  <!-- Results Screen -->
  <div class="results-screen" id="resultsScreen">

      <div class="stat-card red">
        <div class="stat-value" id="finalWrong">0</div>
        <div class="stat-label">Yanlış</div>

      <div class="stat-card">
        <div class="stat-value" id="finalTotal">0</div>
        <div class="stat-label">Toplam</div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-primary-action" id="retryWrongBtn">Yanlışları Tekrar Çöz</button>
      <button class="btn-secondary-action" id="retryAllBtn">Tekrar Başla</button>
      <button class="btn-secondary-action" id="goHomeBtn">Ana Menü</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// QUESTION BANK — Every treaty, date, event from the PDF
// ============================================================
const allQuestions = [
// ── TOPIC 1: Osmanlı Dağılma Dönemi ──
{
  topic: "Osmanlı Dağılma Dönemi",
  q: "Karlofça Antlaşması hangi yılda imzalanmıştır?",

  answer: 1,

},
{

  explanation: "Karlofça Antlaşması ile Osmanlı Macaristan'ın büyük bölümünü, Ukrayna, Mora Yarımadası ve Dalmaçya kıyılarını kaybetmiştir."
},
{
  topic: "Osmanlı Dağılma Dönemi",
  q: "93 Harbi (Osmanlı-Rus Harbi) hangi yıllar arasında gerçekleşmiştir?",
  options: ["1853-1856", "1877-1878", "1897-1898", "1870-1871"],
  answer: 1,
  explanation: "93 Harbi 1877-1878 yılları arasında gerçekleşmiştir."
},
{
  topic: "Osmanlı Dağılma Dönemi",
  q: "Berlin Antlaşması hangi tarihte imzalanmıştır?",
  options: ["3 Mart 1878", "13 Temmuz 1878", "13 Haziran 1878", "28 Haziran 1878"],
  answer: 1,
  explanation: "Berlin Antlaşması 13 Temmuz 1878'de imzalanmıştır."
},
{
  topic: "Osmanlı Dağılma Dönemi",

},
{

  options: ["1878", "1882", "1876", "1885"],
  answer: 1,
  explanation: "Britanya 1882'de Mısır'ı işgal etmiştir. Bu, İngiltere'nin Osmanlı politikasındaki değişimin göstergesidir."
},
{
  topic: "Osmanlı Dağılma Dönemi",
  q: "Ayastefanos Antlaşması hangi ülkeyi rahatsız etmiştir ve neden?",
  options: ["Fransa - Akdeniz ticareti tehlikeye girdi", "Britanya - Hindistan yolları tehlikeye girdi", "Almanya - Balkan hakimiyeti azaldı", "İtalya - Adriyatik kontrolü zayıfladı"],

{
  topic: "Osmanlı Dağılma Dönemi",

{

{

{

// ============================================================
// APP LOGIC
// ============================================================
const topicMeta = {
  "Osmanlı Dağılma Dönemi": { icon: "🏰", color: "#8B5CF6", bg: "rgba(139,92,246,0.1)" },
  "II. Abdülhamid ve II. Meşrutiyet": { icon: "👑", color: "#EC4899", bg: "rgba(236,72,153,0.1)" },
  "I. Dünya Savaşı": { icon: "⚔️", color: "#EF4444", bg: "rgba(239,68,68,0.1)" },
  "Kurtuluş Savaşı Dış Politika": { icon: "🗺️", color: "#F59E0B", bg: "rgba(245,158,11,0.1)" },
  "TBMM Dönemi": { icon: "🏛️", color: "#10B981", bg: "rgba(16,185,129,0.1)" },
  "Sovyet Rusya ile İlişkiler": { icon: "☭", color: "#DC2626", bg: "rgba(220,38,38,0.1)" },
  "Afganistan ve Kafkas İlişkileri": { icon: "🤝", color: "#8B5CF6", bg: "rgba(139,92,246,0.1)" },
  "Batılı Devletlerle İlişkiler (Kurtuluş Savaşı)": { icon: "🌍", color: "#3B82F6", bg: "rgba(59,130,246,0.1)" },
  "Mudanya ve Lozan": { icon: "📝", color: "#0EA5E9", bg: "rgba(14,165,233,0.1)" },
  "1923 Sonrası Dış İlişkiler": { icon: "🇹🇷", color: "#059669", bg: "rgba(5,150,105,0.1)" },
  "1930-1938 Dönemi": { icon: "🏗️", color: "#7C3AED", bg: "rgba(124,58,237,0.1)" },
  "II. Dünya Savaşı Dönemi": { icon: "💣", color: "#B91C1C", bg: "rgba(185,28,28,0.1)" }
};

let currentQuestions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let wrongQueue = []; // questions answered wrong, to re-show after 3-5 Qs
let pendingRetries = []; // {question, showAfter}
let answered = false;
let currentTopicFilter = null;

function getTopics() {
  const topics = {};
  allQuestions.forEach(q => {
    if (!topics[q.topic]) topics[q.topic] = 0;
    topics[q.topic]++;
  });
  return topics;
}

function renderHome() {
  document.getElementById('homeScreen').style.display = 'block';
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('topStats').style.display = 'none';
  document.getElementById('topTitle').textContent = 'Türk Dış Politikası';

  const topics = getTopics();
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = '';

  const topicOrder = [
    "Osmanlı Dağılma Dönemi",
    "II. Abdülhamid ve II. Meşrutiyet",
    "I. Dünya Savaşı",
    "Kurtuluş Savaşı Dış Politika",
    "TBMM Dönemi",
    "Sovyet Rusya ile İlişkiler",
    "Afganistan ve Kafkas İlişkileri",
    "Batılı Devletlerle İlişkiler (Kurtuluş Savaşı)",
    "Mudanya ve Lozan",
    "1923 Sonrası Dış İlişkiler",
    "1930-1938 Dönemi",
    "II. Dünya Savaşı Dönemi"
  ];

  topicOrder.forEach(name => {
    if (!topics[name]) return;
    const meta = topicMeta[name] || { icon: "📄", color: "#6B7280", bg: "rgba(107,114,128,0.1)" };
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.innerHTML = `
      <div class="topic-icon" style="background:${meta.bg};color:${meta.color}">${meta.icon}</div>
      <div class="topic-info">
        <h3>${name}</h3>
        <p>${topics[name]} soru</p>
      </div>
      <span class="chevron">›</span>
    `;
    card.onclick = () => startQuiz(name);
    grid.appendChild(card);
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(topicName) {
  currentTopicFilter = topicName;
  let qs;
  if (topicName === '__all__') {
    qs = shuffle(allQuestions);
  } else if (topicName === '__wrong__') {
    qs = shuffle(wrongQueue);
    wrongQueue = [];
  } else {
    qs = shuffle(allQuestions.filter(q => q.topic === topicName));
  }
  currentQuestions = qs;
  currentIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  pendingRetries = [];
  answered = false;

  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('quizScreen').style.animation = 'none';
  void document.getElementById('quizScreen').offsetHeight;
  document.getElementById('quizScreen').style.animation = 'fadeUp 0.4s ease';
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('topStats').style.display = 'flex';

  const label = topicName === '__all__' ? 'Tüm Sorular' : topicName === '__wrong__' ? 'Yanlış Cevaplar' : topicName;
  document.getElementById('topTitle').textContent = label;
  document.getElementById('topicLabel').textContent = label;

  updateStats();
  renderQuestion();
}

function getNextQuestion() {
  // Check if any pending retry should be shown
  for (let i = 0; i < pendingRetries.length; i++) {
    if (currentIndex >= pendingRetries[i].showAfter) {
      const retry = pendingRetries.splice(i, 1)[0];
      return retry.question;
    }
  }
  if (currentIndex < currentQuestions.length) {
    return currentQuestions[currentIndex];
  }
  // Check remaining retries
  if (pendingRetries.length > 0) {
    return pendingRetries.shift().question;
  }
  return null;
}

function renderQuestion() {
  const q = getNextQuestion();
  if (!q) {
    showResults();
    return;
  }

  answered = false;
  const total = currentQuestions.length + pendingRetries.length;
  const progress = ((currentIndex) / Math.max(total, currentQuestions.length)) * 100;

  document.getElementById('progressLabel').textContent = `Soru ${currentIndex + 1}`;
  document.getElementById('progressBar').style.width = Math.min(progress, 100) + '%';

  const meta = topicMeta[q.topic] || { icon: "📄", color: "#6B7280" };
  document.getElementById('qCategory').textContent = q.topic;
  document.getElementById('qCategory').style.color = meta.color;
  document.getElementById('qText').textContent = q.q;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => handleAnswer(i, q);
    container.appendChild(btn);
  });

  document.getElementById('explanation').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  // Animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = 'fadeUp 0.35s ease';
}

function handleAnswer(selected, question) {
  if (answered) return;
  answered = true;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === question.answer) btn.classList.add('correct');
    if (i === selected && selected !== question.answer) btn.classList.add('wrong');
  });

  if (selected === question.answer) {
    correctCount++;
  } else {
    wrongCount++;
    wrongQueue.push(question);
    // Schedule retry after 3-5 questions
    const retryAfter = currentIndex + 3 + Math.floor(Math.random() * 3);
    pendingRetries.push({ question, showAfter: retryAfter });
  }

  const exp = document.getElementById('explanation');
  exp.textContent = question.explanation;
  exp.style.display = 'block';

  document.getElementById('nextBtn').style.display = 'block';
  currentIndex++;
  updateStats();
}

function updateStats() {
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  const total = correctCount + wrongCount;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('statScore').textContent = pct + '%';
}

function showResults() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'block';
  document.getElementById('resultsScreen').style.animation = 'none';
  void document.getElementById('resultsScreen').offsetHeight;
  document.getElementById('resultsScreen').style.animation = 'fadeUp 0.5s ease';

  const total = correctCount + wrongCount;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;

  document.getElementById('finalScore').textContent = pct + '%';
  document.getElementById('finalCorrect').textContent = correctCount;
  document.getElementById('finalWrong').textContent = wrongCount;
  document.getElementById('finalTotal').textContent = total;

  let label = '';
  if (pct >= 90) label = 'Mükemmel! 🎉';
  else if (pct >= 70) label = 'Çok İyi! 👏';
  else if (pct >= 50) label = 'İyi, ama daha çalışmalısın! 📚';
  else label = 'Daha fazla çalışman gerekiyor! 💪';
  document.getElementById('finalLabel').textContent = label;

  const retryBtn = document.getElementById('retryWrongBtn');
  if (wrongQueue.length > 0) {
    retryBtn.style.display = 'block';
    retryBtn.textContent = `Yanlışları Tekrar Çöz (${wrongQueue.length})`;
  } else {
    retryBtn.style.display = 'none';
  }
}

// Event listeners
document.getElementById('nextBtn').onclick = renderQuestion;
document.getElementById('backBtn').onclick = renderHome;
document.getElementById('startAllBtn').onclick = () => startQuiz('__all__');
document.getElementById('retryWrongBtn').onclick = () => startQuiz('__wrong__');
document.getElementById('retryAllBtn').onclick = () => {
  if (currentTopicFilter && currentTopicFilter !== '__wrong__') {
    startQuiz(currentTopicFilter);
  } else {
    startQuiz('__all__');
  }
};
document.getElementById('goHomeBtn').onclick = renderHome;

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (document.getElementById('quizScreen').style.display === 'none') return;
  if (!answered) {
    const map = { '1': 0, '2': 1, '3': 2, '4': 3, 'a': 0, 'b': 1, 'c': 2, 'd': 3 };
    if (map[e.key.toLowerCase()] !== undefined) {
      const btns = document.querySelectorAll('.option-btn');
      if (btns[map[e.key.toLowerCase()]]) btns[map[e.key.toLowerCase()]].click();
    }
  } else {
    if (e.key === 'Enter' || e.key === ' ') {
      document.getElementById('nextBtn').click();
    }
  }
});

// Init
renderHome();
</script>
