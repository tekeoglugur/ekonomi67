<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türk Dış Politikası Quiz</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=SF+Pro+Text:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --text-primary: #1d1d1f;
  --text-secondary: #86868b;
  --accent: #0071e3;
  --accent-hover: #0077ED;
  --correct: #34c759;
  --correct-bg: rgba(52,199,89,0.08);
  --wrong: #ff3b30;
  --wrong-bg: rgba(255,59,48,0.08);
  --border: rgba(0,0,0,0.06);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 12px;
  --transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.app-header {
  background: rgba(255,255,255,0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 14px 0;
}

.app-header h1 {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  text-align: center;
  margin: 0;
}

.main-container {
  max-width: 680px;
  margin: 0 auto;
  padding: 24px 20px 100px;
}

/* START SCREEN */
.start-screen {
  text-align: center;
  padding: 60px 20px;
  animation: fadeUp 0.6s ease;
}

.start-screen .icon {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #0071e3, #40a0ff);
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 36px;
  box-shadow: 0 6px 20px rgba(0,113,227,0.3);
}

.start-screen h2 {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.025em;
  margin-bottom: 8px;
}

.start-screen p {
  color: var(--text-secondary);
  font-size: 1.05rem;
  margin-bottom: 32px;
  line-height: 1.5;
}

.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 32px;
  text-align: left;
}

.cat-card {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 16px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.cat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.cat-card.selected {
  border-color: var(--accent);
  background: rgba(0,113,227,0.04);
}

.cat-card.selected::after {
  content: '✓';
  position: absolute;
  top: 10px;
  right: 12px;
  color: var(--accent);
  font-weight: 700;
  font-size: 14px;
}

.cat-card .cat-emoji { font-size: 24px; margin-bottom: 6px; display: block; }
.cat-card .cat-name { font-weight: 600; font-size: 0.85rem; line-height: 1.3; }
.cat-card .cat-count { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

.btn-apple {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 980px;
  padding: 14px 40px;
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  min-width: 200px;
  letter-spacing: -0.01em;
}

.btn-apple:hover { background: var(--accent-hover); transform: scale(1.02); }
.btn-apple:active { transform: scale(0.98); }
.btn-apple:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-outline {
  background: transparent;
  color: var(--accent);
  border: 1.5px solid var(--accent);
}

.btn-outline:hover {
  background: rgba(0,113,227,0.06);
  color: var(--accent);
}

/* QUIZ SCREEN */
.quiz-screen { animation: fadeUp 0.4s ease; }

.progress-bar-container {
  background: rgba(0,0,0,0.06);
  height: 4px;
  border-radius: 2px;
  margin-bottom: 28px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
}

.quiz-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.quiz-meta .category-tag {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--accent);
  background: rgba(0,113,227,0.08);
  padding: 4px 12px;
  border-radius: 980px;
}

.quiz-meta .counter {
  font-size: 0.85rem;
  color: var(--text-secondary);
  font-weight: 500;
}

.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px 24px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  animation: fadeUp 0.35s ease;
}

.question-text {
  font-size: 1.15rem;
  font-weight: 600;
  line-height: 1.55;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
}

.option-btn {
  display: flex;
  align-items: center;
  width: 100%;
  background: var(--bg);
  border: 1.5px solid transparent;
  border-radius: var(--radius-sm);
  padding: 15px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  font-size: 0.95rem;
  line-height: 1.4;
  position: relative;
}

.option-btn:hover:not(.disabled) {
  border-color: var(--accent);
  background: rgba(0,113,227,0.03);
}

.option-btn .option-letter {
  min-width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 0.8rem;
  margin-right: 14px;
  transition: var(--transition);
  flex-shrink: 0;
}

.option-btn:hover:not(.disabled) .option-letter {
  background: var(--accent);
  color: #fff;
}

.option-btn.correct {
  background: var(--correct-bg);
  border-color: var(--correct);
}

.option-btn.correct .option-letter {
  background: var(--correct);
  color: #fff;
}

.option-btn.wrong {
  background: var(--wrong-bg);
  border-color: var(--wrong);
}

.option-btn.wrong .option-letter {
  background: var(--wrong);
  color: #fff;
}

.option-btn.disabled { cursor: default; opacity: 0.6; }
.option-btn.disabled:hover { border-color: transparent; background: var(--bg); }
.option-btn.correct.disabled, .option-btn.wrong.disabled { opacity: 1; }

.feedback-box {
  margin-top: 16px;
  padding: 16px 18px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  line-height: 1.5;
  animation: fadeUp 0.3s ease;
}

.feedback-box.correct-fb {
  background: var(--correct-bg);
  border-left: 3px solid var(--correct);
}

.feedback-box.wrong-fb {
  background: var(--wrong-bg);
  border-left: 3px solid var(--wrong);
}

.feedback-box .fb-title {
  font-weight: 600;
  margin-bottom: 4px;
}

.next-btn-wrap {
  text-align: center;
  margin-top: 20px;
}

/* SCORE BAR */
.score-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255,255,255,0.82);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--border);
  padding: 12px 20px;
  z-index: 100;
}

.score-bar-inner {
  max-width: 680px;
  margin: 0 auto;
  display: flex;
  justify-content: space-around;
  text-align: center;
}

.score-item .score-num {
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.score-item .score-label {
  font-size: 0.7rem;
  color: var(--text-secondary);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.score-num.green { color: var(--correct); }
.score-num.red { color: var(--wrong); }
.score-num.blue { color: var(--accent); }

/* RESULT SCREEN */
.result-screen {
  text-align: center;
  padding: 40px 20px;
  animation: fadeUp 0.6s ease;
}

.result-circle {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  margin: 0 auto 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

.result-circle svg {
  position: absolute;
  top: 0;
  left: 0;
  transform: rotate(-90deg);
}

.result-circle .pct {
  font-size: 2.8rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  z-index: 1;
}

.result-circle .pct-label {
  font-size: 0.85rem;
  color: var(--text-secondary);
  font-weight: 500;
  z-index: 1;
}

.result-screen h2 {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.025em;
  margin-bottom: 8px;
}

.result-screen .result-subtitle {
  color: var(--text-secondary);
  font-size: 1rem;
  margin-bottom: 32px;
}

.stat-row {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
}

.stat-card {
  flex: 1;
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 18px 12px;
  box-shadow: var(--shadow);
}

.stat-card .stat-val {
  font-size: 1.5rem;
  font-weight: 700;
}

.stat-card .stat-lbl {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

.shake { animation: shake 0.4s ease; }

/* RESPONSIVE */
@media (max-width: 480px) {
  .category-grid { grid-template-columns: 1fr; }
  .start-screen h2 { font-size: 1.6rem; }
  .question-text { font-size: 1.05rem; }
  .stat-row { flex-direction: column; }
}

.retry-badge {
  display: inline-block;
  background: #ff9500;
  color: #fff;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 980px;
  margin-left: 8px;
  vertical-align: middle;
  letter-spacing: 0.02em;
}

.hidden { display: none !important; }

.select-all-row {
  text-align: center;
  margin-bottom: 16px;
}

.select-all-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  padding: 6px 12px;
}

.select-all-btn:hover { text-decoration: underline; }
</style>
</head>
<body>

<header class="app-header">

    <div class="select-all-row">
      <button class="select-all-btn" onclick="toggleAllCategories()">Tümünü Seç / Kaldır</button>
    </div>

    <div class="category-grid" id="categoryGrid"></div>

    <button class="btn-apple" id="startBtn" onclick="startQuiz()" disabled>

    <div class="next-btn-wrap hidden" id="nextWrap">

  </div>

  <!-- RESULT SCREEN -->

</div>

<!-- SCORE BAR -->
<div class="score-bar hidden" id="scoreBar">

      <div class="score-label">Kalan</div>
    </div>
  </div>
</div>

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let selectedCats = new Set();
let questionQueue = [];
let retryQueue = []; // {question, retryAfter}
let currentQ = null;
let answered = false;
let correctTotal = 0;
let wrongTotal = 0;
let questionIndex = 0;
let totalQuestions = 0;

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init() {
  const grid = document.getElementById('categoryGrid');
  categories.forEach(cat => {
    const count = allQuestions.filter(q => catMap[q.category] === cat.id).length;
    const div = document.createElement('div');
    div.className = 'cat-card';
    div.dataset.id = cat.id;
    div.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><div class="cat-name">${cat.name}</div><div class="cat-count">${count} soru</div>`;
    div.onclick = () => toggleCat(cat.id, div);
    grid.appendChild(div);
  });
}

function toggleCat(id, el) {
  if (selectedCats.has(id)) {
    selectedCats.delete(id);
    el.classList.remove('selected');
  } else {
    selectedCats.add(id);
    el.classList.add('selected');
  }
  document.getElementById('startBtn').disabled = selectedCats.size === 0;
}

function toggleAllCategories() {
  const cards = document.querySelectorAll('.cat-card');
  if (selectedCats.size === categories.length) {
    selectedCats.clear();
    cards.forEach(c => c.classList.remove('selected'));
  } else {
    categories.forEach(cat => selectedCats.add(cat.id));
    cards.forEach(c => c.classList.add('selected'));
  }
  document.getElementById('startBtn').disabled = selectedCats.size === 0;
}

// ═══════════════════════════════════════
// QUIZ LOGIC
// ═══════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  const filtered = allQuestions.filter(q => selectedCats.has(catMap[q.category]));
  questionQueue = shuffle([...filtered]);
  retryQueue = [];
  correctTotal = 0;
  wrongTotal = 0;
  questionIndex = 0;
  totalQuestions = questionQueue.length;

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('scoreBar').classList.remove('hidden');

  showQuestion();
}

function getNextQuestion() {
  // Check if any retry questions are due
  for (let i = 0; i < retryQueue.length; i++) {
    if (questionIndex >= retryQueue[i].retryAfter) {
      const item = retryQueue.splice(i, 1)[0];
      return { ...item.question, isRetry: true };
    }
  }
  // Otherwise get from main queue
  if (questionQueue.length > 0) {
    return { ...questionQueue.shift(), isRetry: false };
  }
  // Check remaining retries
  if (retryQueue.length > 0) {
    const item = retryQueue.shift();
    return { ...item.question, isRetry: true };
  }
  return null;
}

function showQuestion() {
  currentQ = getNextQuestion();
  if (!currentQ) {
    showResults();
    return;
  }

  answered = false;
  questionIndex++;

  const remaining = questionQueue.length + retryQueue.length;
  document.getElementById('correctCount').textContent = correctTotal;
  document.getElementById('wrongCount').textContent = wrongTotal;
  document.getElementById('remainCount').textContent = remaining;

  const progress = ((questionIndex - 1) / (totalQuestions + retryQueue.length + (questionQueue.length === 0 ? 0 : 0))) * 100;
  document.getElementById('progressBar').style.width = Math.min(progress, 100) + '%';

  document.getElementById('catTag').innerHTML = currentQ.category + (currentQ.isRetry ? '<span class="retry-badge">Tekrar</span>' : '');
  document.getElementById('qCounter').textContent = `Soru ${questionIndex}`;

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeUp 0.35s ease';

  document.getElementById('questionText').textContent = currentQ.q;

  // Shuffle options while tracking correct answer
  const correctText = currentQ.options[currentQ.answer];
  const shuffledOptions = shuffle([...currentQ.options]);
  const newCorrectIndex = shuffledOptions.indexOf(correctText);

  const letters = ['A', 'B', 'C', 'D'];
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  shuffledOptions.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(btn, i, newCorrectIndex);
    container.appendChild(btn);
  });

  document.getElementById('feedbackBox').innerHTML = '';
  document.getElementById('nextWrap').classList.add('hidden');
}

function selectAnswer(btn, selected, correct) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.classList.add('disabled'));

  const fb = document.getElementById('feedbackBox');

  if (selected === correct) {
    btn.classList.add('correct');
    correctTotal++;
    fb.innerHTML = `<div class="feedback-box correct-fb"><div class="fb-title">✓ Doğru!</div><div>${currentQ.info}</div></div>`;
  } else {
    btn.classList.add('wrong');
    allBtns[correct].classList.add('correct');
    wrongTotal++;

    // Add to retry queue (3-5 questions later)
    const delay = 3 + Math.floor(Math.random() * 3);
    retryQueue.push({
      question: {
        category: currentQ.category,
        q: currentQ.q,
        options: currentQ.options,
        answer: currentQ.answer,
        info: currentQ.info
      },
      retryAfter: questionIndex + delay
    });
    totalQuestions++;

    const card = document.getElementById('questionCard');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);

    fb.innerHTML = `<div class="feedback-box wrong-fb"><div class="fb-title">✗ Yanlış!</div><div>${currentQ.info}<br><small style="color:var(--text-secondary);margin-top:6px;display:block;">Bu soru ${delay} soru sonra tekrar sorulacak.</small></div></div>`;
  }

  document.getElementById('correctCount').textContent = correctTotal;
  document.getElementById('wrongCount').textContent = wrongTotal;
  document.getElementById('remainCount').textContent = questionQueue.length + retryQueue.length;

  document.getElementById('nextWrap').classList.remove('hidden');
}

function nextQuestion() {
  showQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════
function showResults() {
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('scoreBar').classList.add('hidden');

  const total = correctTotal + wrongTotal;
  const pct = total > 0 ? Math.round((correctTotal / total) * 100) : 0;

  let message = '';
  let emoji = '';
  if (pct >= 90) { message = 'Mükemmel!'; emoji = '🏆'; }
  else if (pct >= 70) { message = 'Çok İyi!'; emoji = '🌟'; }
  else if (pct >= 50) { message = 'İyi!'; emoji = '👍'; }
  else { message = 'Tekrar Dene!'; emoji = '📚'; }

  const circumference = 2 * Math.PI * 68;
  const offset = circumference - (pct / 100) * circumference;
  const color = pct >= 70 ? 'var(--correct)' : pct >= 50 ? '#ff9500' : 'var(--wrong)';

  const screen = document.getElementById('resultScreen');
  screen.classList.remove('hidden');
  screen.innerHTML = `
    <div class="result-circle">
      <svg width="160" height="160">
        <circle cx="80" cy="80" r="68" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="8"/>
        <circle cx="80" cy="80" r="68" fill="none" stroke="${color}" stroke-width="8"
          stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"
          stroke-linecap="round" id="resultArc"/>
      </svg>
      <span class="pct" style="color:${color}">${pct}%</span>
      <span class="pct-label">Başarı</span>
    </div>
    <h2>${emoji} ${message}</h2>
    <p class="result-subtitle">${total} sorudan ${correctTotal} tanesini doğru yanıtladınız.</p>
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-val" style="color:var(--correct)">${correctTotal}</div>
        <div class="stat-lbl">Doğru</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--wrong)">${wrongTotal}</div>
        <div class="stat-lbl">Yanlış</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--accent)">${questionIndex}</div>
        <div class="stat-lbl">Toplam Soru</div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-apple" onclick="restartQuiz()">Tekrar Dene</button>
      <button class="btn-apple btn-outline" onclick="goHome()">Ana Menü</button>
    </div>
  `;

  // Animate arc
  setTimeout(() => {
    document.getElementById('resultArc').style.transition = 'stroke-dashoffset 1.2s cubic-bezier(0.25, 0.1, 0.25, 1)';
    document.getElementById('resultArc').style.strokeDashoffset = offset;
  }, 100);
}

function restartQuiz() {
  document.getElementById('resultScreen').classList.add('hidden');
  startQuiz();
}

function goHome() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

// INIT
init();
</script>
</body>
</html>
